site_name: "Appunti di Calcolatori elettronici"
site_url: "https://Asia-Calvani.github.io/Appunti-calcolatori-elettronici/"

theme:
  name: material
  language: it
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - content.code.copy
    - content.tabs.link

nav:
  - Home: index.md
  - Lezioni:
      - "Lezione 1": lezioni/lezione-01.md
  - Esercizi:
      - "Esercizi 1": esercizi/esercizi-01.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.details
  - pymdownx.arithmatex:
      generic: true

extra_css:
  - stylesheets/extra.css

extra_javascript:
  # KaTeX (formule)
  - https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js
  - https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js
  - javascripts/katex.js
